<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Changelog Component</title>

  <!-- Link CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="changelog">

    <h1>Changelog</h1>

    <div class="timeline">

      <div class="entry">
        <div class="dot"></div>
        <div class="content">
          <h3>Version 1.0</h3>
          <p>Initial release of the project.</p>
          <span class="date">April 2026</span>
        </div>
      </div>

      <div class="entry">
        <div class="dot"></div>
        <div class="content">
          <h3>Version 1.1</h3>
          <p>Added new features and improved performance.</p>
          <span class="date">May 2026</span>
        </div>
      </div>

      <div class="entry">
        <div class="dot"></div>
        <div class="content">
          <h3>Version 2.0</h3>
          <p>Major update with redesigned UI and bug fixes.</p>
          <span class="date">June 2026</span>
        </div>
      </div>

    </div>

  </main>

</body>
</html>
